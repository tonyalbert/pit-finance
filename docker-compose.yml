services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8347}:${PORT:-8347}"
    env_file:
      - .env

  frontend:
    build:
      context: ./front-finance
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8347
    restart: unless-stopped
    ports:
      - "4821:4821"
    depends_on:
      - backend
